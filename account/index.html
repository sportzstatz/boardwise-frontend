<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account - BoardWise</title>
  <meta name="description" content="BoardWise account profile and product access.">
  <link rel="stylesheet" href="/assets/css/boardwise-theme.css">
  <link rel="stylesheet" href="/assets/css/account.css">
</head>
<body>
  <main class="account-shell" aria-labelledby="account-title">
    <div class="account-heading">
      <p class="bw-kicker">BoardWise · Account</p>
      <h1 id="account-title" class="account-title">Account</h1>
    </div>

    <div class="account-grid">
      <section class="account-identity-card" aria-labelledby="account-profile-heading">
        <div class="account-profile">
          <span id="account-avatar" class="account-avatar" data-auth-initials aria-hidden="true">A</span>
          <div class="account-profile__text">
            <h2 id="account-profile-heading">
              <span id="account-name" data-auth-label>Checking account...</span>
            </h2>
            <p id="account-email">Loading account state...</p>
          </div>
        </div>

        <div class="account-pills" aria-label="Account labels">
          <span id="account-plan" class="account-pill account-pill--gold">Checking access</span>
          <span id="account-auth-state" class="account-pill account-pill--outline">Secure profile</span>
        </div>

        <p id="account-status" class="sr-only">Checking account state...</p>
        <div id="account-actions" class="account-actions" aria-label="Account actions"></div>
      </section>

      <div class="account-side">
        <section class="account-access" aria-labelledby="account-access-heading">
          <h2 id="account-access-heading" class="sr-only">Product Access</h2>
          <div id="account-access-list" class="account-access-list" aria-live="polite">
            <article class="account-access-card" aria-busy="true">
              <span class="account-access-icon" aria-hidden="true">BW</span>
              <div class="account-access-main">
                <h3>Checking access</h3>
                <p>Loading BoardWise products.</p>
              </div>
            </article>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/auth-state.js"></script>
  <script src="/assets/js/gates.js"></script>
  <script src="/assets/js/account.js"></script>
</body>
</html>
