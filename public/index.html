<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MLB Forecast and Betting Board</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #d0d5dd;
      --accent: #0f4c81;
      --good: #156f3c;
      --good-soft: #edf9f0;
      --accent-soft: #eef4ff;
      --shadow: 0 10px 24px rgba(16, 24, 40, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }
    .header {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }
    .subtitle {
      color: var(--muted);
      line-height: 1.5;
      max-width: 78ch;
      font-size: 15px;
    }
    .meta,
    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill,
    .nav-link {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      text-decoration: none;
      color: var(--muted);
    }
    .nav-link {
      color: var(--ink);
      font-weight: 700;
    }
    .quick-guide {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .quick-guide-card {
      background: #fcfcfd;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .best-card-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .toggle-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .bucket-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .bucket-pill {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 100ms, color 100ms, border-color 100ms;
    }
    .bucket-pill.active {
      color: #fff;
    }
    .tile-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 0;
    }
    .tile {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left-width: 6px;
      border-left-color: var(--accent);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .tile.strong { border-left-color: var(--good); }
    .tile-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .game-label {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }
    .game-time {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }
    .venue-text {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .favorite-badge {
      text-align: right;
      font-size: 14px;
      font-weight: 800;
      color: #667085;
      white-space: nowrap;
    }
    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      background: #fcfcfd;
      margin-top: 10px;
    }
    .pitchers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 0 14px;
    }
    .pitcher-card {
      border: 1px solid #eaecf0;
      border-radius: 12px;
      padding: 12px;
      background: #fcfcfd;
    }
    .pitcher-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .pitcher-name {
      margin-top: 4px;
      font-size: 15px;
      font-weight: 700;
    }
    .lineup-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .lineup-tag.confirmed {
      color: var(--good);
      background: var(--good-soft);
      border-color: rgba(21, 111, 60, 0.2);
    }
    .lineup-tag.projected {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(15, 76, 129, 0.18);
    }
    .lineup-tag.unknown {
      color: var(--muted);
      background: #f2f4f7;
      border-color: var(--line);
    }
    .best-card {
      border: 1px solid #eaecf0;
      border-radius: 12px;
      padding: 12px 14px;
      margin: 0 0 12px;
      background: #fcfcfd;
    }
    .tile.strong .best-card {
      background: #f0faf2;
      border-color: rgba(21, 111, 60, 0.25);
    }
    .best-bet {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 2px;
    }
    .best-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .best-metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eaecf0;
    }
    .metric-bubble {
      border: 1px solid #eaecf0;
      border-radius: 10px;
      padding: 8px 10px;
      background: #ffffff;
      text-align: center;
    }
    .metric-bubble .m-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .metric-bubble .m-value {
      margin-top: 3px;
      font-size: 14px;
      font-weight: 800;
    }
    .dropdown-stack {
      display: grid;
      gap: 10px;
    }
    .market-dropdown {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fcfcfd;
    }
    .market-dropdown summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      font-weight: 700;
    }
    .market-dropdown summary::-webkit-details-marker { display: none; }
    .summary-label {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }
    .summary-center {
      text-align: center;
      color: var(--ink);
      font-weight: 600;
      font-size: 14px;
    }
    .summary-icon {
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
    }
    .market-dropdown[open] .summary-icon-plus { display: none; }
    .market-dropdown:not([open]) .summary-icon-minus { display: none; }
    .dropdown-body {
      padding: 0 14px 14px;
      border-top: 1px solid #eaecf0;
    }
    .option-card {
      border: 1px solid #eaecf0;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      background: #ffffff;
    }
    .option-card.primary {
      border-color: rgba(15, 76, 129, 0.3);
      background: var(--accent-soft);
    }
    .option-card.official {
      border-color: rgba(21, 111, 60, 0.3);
      background: var(--good-soft);
    }
    .option-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .option-label {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }
    .option-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .option-badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .option-badge.official {
      color: var(--good);
      background: var(--good-soft);
      border-color: rgba(21, 111, 60, 0.2);
    }
    .option-metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .confidence-high { color: var(--good); }
    .confidence-medium_high { color: #16734b; }
    .confidence-medium { color: var(--accent); }
    .confidence-medium_low { color: #b54708; }
    .confidence-low { color: #b42318; }
    .rating-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
      white-space: nowrap;
    }
    .md-projected-score {
      border: 1px solid #eaecf0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      background: #ffffff;
    }
    .md-projected-score .m-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .md-projected-score .m-value {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 800;
    }
    .md-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .md-cell {
      border: 1px solid #eaecf0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #ffffff;
    }
    .md-cell .m-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .md-cell .m-value {
      margin-top: 3px;
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }
    .md-wide {
      grid-column: 1 / -1;
    }
    .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .forecast-only-note {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fcfcfd;
      color: var(--muted);
      font-size: 14px;
      margin: 14px 0;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 18px;
    }
    .footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 13px;
    }
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 18px;
    }
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: #b42318;
      font-size: 16px;
    }
    @media (max-width: 980px) {
      .quick-guide { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .best-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .option-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .md-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .tile-top { display: grid; }
      .favorite-badge { text-align: left; }
      .quick-guide { grid-template-columns: 1fr; }
      .tile-list { grid-template-columns: 1fr; }
      .pitchers { grid-template-columns: 1fr; }
      .best-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .option-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .md-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="loading-state" id="loading">Loading board data&hellip;</div>
  </div>
  <script>
  (function () {
    "use strict";
    var API = "https://api.useboardwise.com";
    var app = document.getElementById("app");

    /* ── helpers ─────────────────────────────────── */
    function h(tag, cls, html) {
      var el = document.createElement(tag);
      if (cls) el.className = cls;
      if (html !== undefined) el.innerHTML = html;
      return el;
    }
    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    /* ── metric bubble ──────────────────────────── */
    function metricBubble(label, value) {
      return '<div class="metric-bubble"><div class="m-label">' + esc(label) + '</div><div class="m-value">' + esc(value) + '</div></div>';
    }

    /* ── best card ──────────────────────────────── */
    function renderBestCard(bc, variant, ratingLabel, ratingColor, show) {
      if (!bc) return "";
      var display = show ? "" : "display:none";
      var variantLabel = variant === "highest_ev" ? "Highest EV" : "Highest Model Prob";
      return '<div class="best-card" data-best-card-variant="' + variant + '" style="' + display + '">'
        + '<div style="display:flex;justify-content:space-between;align-items:center">'
        + '<div class="label">Best Available Bet <span style="font-weight:400;color:var(--muted)">(' + esc(variantLabel) + ')</span></div>'
        + (ratingLabel ? '<span class="rating-badge" style="background:' + esc(ratingColor) + '">' + esc(ratingLabel) + '</span>' : '')
        + '</div>'
        + '<div class="best-bet">' + esc(bc.selection_text || "") + '</div>'
        + '<div class="best-meta">' + esc(bc.sportsbook || "") + ' ' + esc(bc.odds_text || "") + '</div>'
        + '<div class="best-metrics">'
        + metricBubble("Odds", bc.odds_text || "N/A")
        + metricBubble("Model Prob", bc.model_prob_text || bc.model_probability_text || "N/A")
        + metricBubble("Edge", bc.edge_text || "N/A")
        + metricBubble("EV / Unit", bc.ev_text || "N/A")
        + metricBubble("Stake", bc.stake_text || "N/A")
        + '</div></div>';
    }

    /* ── option card ────────────────────────────── */
    function renderOption(opt) {
      var cls = "option-card";
      if (opt.is_official) cls += " official";
      else if (opt.is_primary) cls += " primary";

      var badges = "";
      if (opt.is_official) badges += '<span class="option-badge official">Official</span> ';
      if (opt.confidence_label) badges += '<span class="option-badge confidence-' + esc(opt.confidence_class || "low") + '">' + esc(opt.confidence_label) + '</span>';

      var evRating = "", probRating = "";
      if (opt.ev_rating) evRating = '<span class="rating-badge option-rating-badge" data-ev-label="' + esc(opt.ev_rating) + '" data-ev-bg="' + esc(opt.ev_rating_color || "") + '" data-prob-label="' + esc(opt.prob_rating || "") + '" data-prob-bg="' + esc(opt.prob_rating_color || "") + '" style="background:' + esc(opt.ev_rating_color || "#667085") + '">' + esc(opt.ev_rating) + '</span>';
      else if (opt.prob_rating) probRating = '<span class="rating-badge option-rating-badge" data-ev-label="" data-ev-bg="" data-prob-label="' + esc(opt.prob_rating) + '" data-prob-bg="' + esc(opt.prob_rating_color || "") + '" style="background:' + esc(opt.prob_rating_color || "#667085") + '">' + esc(opt.prob_rating) + '</span>';

      return '<div class="' + cls + '">'
        + '<div class="option-header"><div><div class="option-label">' + esc(opt.label) + '</div>'
        + (badges ? '<div class="option-meta">' + badges + '</div>' : '')
        + '</div>' + (evRating || probRating) + '</div>'
        + '<div class="option-meta">' + esc(opt.sportsbook || "") + (opt.odds_text && opt.odds_text !== "N/A" ? " " + esc(opt.odds_text) : "") + '</div>'
        + '<div class="option-metrics">'
        + metricBubble("Model Prob", opt.model_probability_text || "N/A")
        + metricBubble("Edge", opt.edge_text || "N/A")
        + metricBubble("EV / Unit", opt.ev_text || "N/A")
        + metricBubble("Stake", opt.stake_text || "N/A")
        + metricBubble("Fair", opt.fair_text || "N/A")
        + '</div></div>';
    }

    /* ── market dropdown ────────────────────────── */
    function renderMarketDropdown(md) {
      var evColor = md.ev_summary_color || "#667085";
      var probColor = md.prob_summary_color || "#667085";
      var official = md.has_official_recommendation ? ' style="border-left:3px solid var(--good)"' : '';
      var body = "";
      for (var i = 0; i < md.options.length; i++) body += renderOption(md.options[i]);

      return '<details class="market-dropdown"' + official + '>'
        + '<summary>'
        + '<span class="summary-label">' + esc(md.title) + '</span>'
        + '<span class="summary-center" data-ev-color="' + esc(evColor) + '" data-prob-color="' + esc(probColor) + '" style="color:' + esc(evColor) + '">' + esc(md.summary_center_text) + '</span>'
        + '<span class="summary-icon"><span class="summary-icon-plus">+</span><span class="summary-icon-minus">&minus;</span></span>'
        + '</summary>'
        + '<div class="dropdown-body">' + body + '</div></details>';
    }

    /* ── model details ──────────────────────────── */
    function renderModelDetails(game) {
      var cells = game.model_details_cells || [];
      var wide = game.model_details_wide || [];
      var grid = "";
      for (var i = 0; i < cells.length; i++) {
        grid += '<div class="md-cell"><div class="m-label">' + esc(cells[i].label) + '</div><div class="m-value">' + esc(cells[i].value) + '</div></div>';
      }
      for (var j = 0; j < wide.length; j++) {
        grid += '<div class="md-cell md-wide"><div class="m-label">' + esc(wide[j].label) + '</div><div class="m-value">' + esc(wide[j].value) + '</div></div>';
      }
      return '<details class="market-dropdown">'
        + '<summary><span class="summary-label">Model Details</span><span class="summary-center">' + esc(game.projected_score_text || "") + '</span>'
        + '<span class="summary-icon"><span class="summary-icon-plus">+</span><span class="summary-icon-minus">&minus;</span></span></summary>'
        + '<div class="dropdown-body">'
        + '<div class="md-projected-score"><div class="m-label">Projected Score</div><div class="m-value">' + esc(game.model_details_projected_score || game.projected_score_text || "") + '</div></div>'
        + '<div class="md-grid">' + grid + '</div></div></details>';
    }

    /* ── game tile ──────────────────────────────── */
    function renderTile(game) {
      var evBorder = game.ev_bucket_color || "#0f4c81";
      var probBorder = game.prob_bucket_color || "#d0d5dd";
      var evBucket = game.ev_bucket_label || "Low";
      var probBucket = game.prob_bucket_label || "<50%";

      var bc = game.best_card_options || {};
      var evCard = renderBestCard(bc.highest_ev, "highest_ev", bc.highest_ev && bc.highest_ev.ev_rating || "", bc.highest_ev && bc.highest_ev.ev_rating_color || "", true);
      var probCard = renderBestCard(bc.highest_model_prob, "highest_model_prob", bc.highest_model_prob && bc.highest_model_prob.prob_rating || "", bc.highest_model_prob && bc.highest_model_prob.prob_rating_color || "", false);

      var dropdowns = "";
      var mds = game.market_dropdowns || [];
      for (var i = 0; i < mds.length; i++) dropdowns += renderMarketDropdown(mds[i]);
      dropdowns += renderModelDetails(game);

      return '<article class="tile" style="border-left-color:' + esc(evBorder) + '" data-ev-border="' + esc(evBorder) + '" data-prob-border="' + esc(probBorder) + '" data-ev-bucket="' + esc(evBucket) + '" data-prob-bucket="' + esc(probBucket) + '">'
        + '<div class="tile-top"><div>'
        + '<div class="game-label">' + esc(game.game_label) + '</div>'
        + '<div class="game-time">' + esc(game.commence_time) + '</div>'
        + '<div class="venue-text">' + esc(game.venue) + '</div>'
        + '<div class="state-badge">' + esc(game.board_state_label) + '</div>'
        + '<div class="venue-text">' + esc(game.board_state_note) + '</div>'
        + '</div><div class="favorite-badge">' + esc(game.favorite_team) + '<br>' + esc(game.favorite_prob_text) + '</div></div>'
        + '<div class="pitchers">'
        + '<div class="pitcher-card"><div class="pitcher-label">Away Pitcher (' + esc(game.away_team_abbr) + ')</div><div class="pitcher-name">' + esc(game.away_pitcher) + '</div><span class="lineup-tag ' + esc(game.lineup_status_away) + '">' + esc(game.lineup_status_away) + '</span></div>'
        + '<div class="pitcher-card"><div class="pitcher-label">Home Pitcher (' + esc(game.home_team_abbr) + ')</div><div class="pitcher-name">' + esc(game.home_pitcher) + '</div><span class="lineup-tag ' + esc(game.lineup_status_home) + '">' + esc(game.lineup_status_home) + '</span></div>'
        + '</div>'
        + evCard + probCard
        + '<div class="dropdown-stack">' + dropdowns + '</div>'
        + '</article>';
    }

    /* ── render board ───────────────────────────── */
    function renderBoard(data) {
      app.innerHTML = "";
      /* header */
      var header = h("section", "header");
      header.innerHTML = '<div class="nav-row"><a class="nav-link" href="/">All Sports</a></div>'
        + '<h1>MLB Forecast and Betting Board</h1>'
        + '<div class="subtitle">Forecasts render from the MLB platform. When matched odds are present, each tile shows a best available bet card and market-level dropdowns with both sides of every market.</div>'
        + '<div class="meta">'
        + '<div class="pill">Generated ' + esc(data.generated_at) + '</div>'
        + '<div class="pill">Date ' + esc(data.target_date) + '</div>'
        + '<div class="pill">Games ' + data.game_count + '</div>'
        + '<div class="pill">Betting Games ' + data.betting_game_count + '</div>'
        + '</div>'
        + (data.mode_note ? '<div class="forecast-only-note">' + esc(data.mode_note) + '</div>' : '');
      app.appendChild(header);

      /* quick guide */
      var guide = h("section", "quick-guide");
      guide.innerHTML = '<article class="quick-guide-card"><div class="stat-label">Best Available Bet</div><div style="color:var(--muted);font-size:14px;margin-top:4px">The highest-ranked recommendation for each game, shown in the tile\'s best card.</div></article>'
        + '<article class="quick-guide-card"><div class="stat-label">Market Dropdowns</div><div style="color:var(--muted);font-size:14px;margin-top:4px">Money Line, Run Line, and Total dropdowns show both sides of every market.</div></article>'
        + '<article class="quick-guide-card"><div class="stat-label">Projected Score</div><div style="color:var(--muted);font-size:14px;margin-top:4px">Forecast means anchor the board even when no betting data is available.</div></article>'
        + '<article class="quick-guide-card"><div class="stat-label">Lineup Status</div><div style="color:var(--muted);font-size:14px;margin-top:4px">Confirmed = official lineup; Projected = based on recent games.</div></article>';
      app.appendChild(guide);

      /* toggles */
      var toggleRow = h("div", "best-card-toggle");
      toggleRow.innerHTML = '<button class="toggle-btn active" data-best-card-sort="highest_ev">Highest EV</button>'
        + '<button class="toggle-btn" data-best-card-sort="highest_model_prob">Highest Model Prob</button>';
      app.appendChild(toggleRow);

      /* filter rows */
      var evRow = h("div", "bucket-filter-row");
      evRow.id = "ev-filters";
      evRow.innerHTML = '<button class="bucket-pill active" data-bucket="all" style="background:var(--accent);border-color:var(--accent);color:#fff">All Games</button>'
        + '<button class="bucket-pill" data-bucket="High" data-bg="#156f3c">High</button>'
        + '<button class="bucket-pill" data-bucket="Medium-High" data-bg="#669f2a">Medium-High</button>'
        + '<button class="bucket-pill" data-bucket="Medium" data-bg="#0f4c81">Medium</button>'
        + '<button class="bucket-pill" data-bucket="Medium-Low" data-bg="#b54708">Medium-Low</button>'
        + '<button class="bucket-pill" data-bucket="Low" data-bg="#b42318">Low</button>';
      app.appendChild(evRow);

      var probRow = h("div", "bucket-filter-row");
      probRow.id = "prob-filters";
      probRow.style.display = "none";
      probRow.innerHTML = '<button class="bucket-pill active" data-bucket="all" style="background:var(--accent);border-color:var(--accent);color:#fff">All Games</button>'
        + '<button class="bucket-pill" data-bucket="70%+" data-bg="#156f3c">70%+</button>'
        + '<button class="bucket-pill" data-bucket="65\u201369%" data-bg="#669f2a">65\u201369%</button>'
        + '<button class="bucket-pill" data-bucket="60\u201364%" data-bg="#dc6803">60\u201364%</button>'
        + '<button class="bucket-pill" data-bucket="55\u201359%" data-bg="#e04f16">55\u201359%</button>'
        + '<button class="bucket-pill" data-bucket="50\u201354%" data-bg="#b54708">50\u201354%</button>'
        + '<button class="bucket-pill" data-bucket="<50%" data-bg="#93370d">&lt;50%</button>';
      app.appendChild(probRow);

      /* tiles */
      var tileSection = h("section", "tile-list");
      if (!data.games || data.games.length === 0) {
        tileSection.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No games found for this date.</div>';
      } else {
        for (var i = 0; i < data.games.length; i++) {
          tileSection.innerHTML += renderTile(data.games[i]);
        }
      }
      app.appendChild(tileSection);

      /* footer */
      var footer = h("section", "footer");
      footer.innerHTML = 'Powered by <strong>BoardWise</strong> | <a href="/">All Sports</a>';
      app.appendChild(footer);

      /* ── interactivity ────────────────────────── */
      var buttons = document.querySelectorAll("[data-best-card-sort]");
      var cards = document.querySelectorAll("[data-best-card-variant]");
      var tiles = document.querySelectorAll(".tile[data-ev-border]");
      var summaries = document.querySelectorAll(".summary-center[data-ev-color]");
      var optBadges = document.querySelectorAll(".option-rating-badge");
      var currentMode = "highest_ev";

      function getActiveFilters() {
        var row = currentMode === "highest_ev" ? evRow : probRow;
        var pills = row.querySelectorAll(".bucket-pill.active");
        var buckets = [];
        pills.forEach(function (p) { buckets.push(p.getAttribute("data-bucket")); });
        return buckets;
      }

      function applyFilter() {
        var buckets = getActiveFilters();
        var showAll = buckets.indexOf("all") >= 0 || buckets.length === 0;
        var attr = currentMode === "highest_ev" ? "data-ev-bucket" : "data-prob-bucket";
        tiles.forEach(function (tile) {
          if (showAll) { tile.style.display = ""; return; }
          tile.style.display = buckets.indexOf(tile.getAttribute(attr) || "") >= 0 ? "" : "none";
        });
      }

      function resetFilters(row) {
        row.querySelectorAll(".bucket-pill").forEach(function (p) {
          if (p.getAttribute("data-bucket") === "all") {
            p.classList.add("active");
            p.style.background = "var(--accent)";
            p.style.borderColor = "var(--accent)";
            p.style.color = "#fff";
          } else {
            p.classList.remove("active");
            p.style.background = "";
            p.style.borderColor = "";
            p.style.color = "";
          }
        });
      }

      function applySort(variant) {
        currentMode = variant;
        buttons.forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-best-card-sort") === variant); });
        cards.forEach(function (card) {
          card.style.display = card.getAttribute("data-best-card-variant") === variant ? "" : "none";
        });
        var borderAttr = variant === "highest_ev" ? "data-ev-border" : "data-prob-border";
        tiles.forEach(function (tile) {
          var c = tile.getAttribute(borderAttr);
          if (c) tile.style.borderLeftColor = c;
        });
        var colorAttr = variant === "highest_ev" ? "data-ev-color" : "data-prob-color";
        summaries.forEach(function (s) {
          var c = s.getAttribute(colorAttr);
          if (c) s.style.color = c;
        });
        var labelAttr = variant === "highest_ev" ? "data-ev-label" : "data-prob-label";
        var bgAttr = variant === "highest_ev" ? "data-ev-bg" : "data-prob-bg";
        optBadges.forEach(function (b) {
          var lbl = b.getAttribute(labelAttr) || "";
          var bg = b.getAttribute(bgAttr) || "";
          b.textContent = lbl;
          b.style.background = bg;
          b.style.display = lbl ? "" : "none";
        });
        evRow.style.display = variant === "highest_ev" ? "" : "none";
        probRow.style.display = variant === "highest_model_prob" ? "" : "none";
        applyFilter();
      }

      function setupFilterRow(row) {
        row.querySelectorAll(".bucket-pill").forEach(function (pill) {
          pill.addEventListener("click", function () {
            var bucket = pill.getAttribute("data-bucket");
            var bg = pill.getAttribute("data-bg") || "";
            if (bucket === "all") {
              resetFilters(row);
            } else {
              var allPill = row.querySelector('[data-bucket="all"]');
              allPill.classList.remove("active");
              allPill.style.background = "";
              allPill.style.borderColor = "";
              allPill.style.color = "";
              pill.classList.toggle("active");
              if (pill.classList.contains("active")) {
                pill.style.background = bg;
                pill.style.borderColor = bg;
                pill.style.color = "#fff";
              } else {
                pill.style.background = "";
                pill.style.borderColor = "";
                pill.style.color = "";
              }
              if (!row.querySelectorAll(".bucket-pill.active").length) resetFilters(row);
            }
            applyFilter();
          });
        });
      }

      setupFilterRow(evRow);
      setupFilterRow(probRow);
      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () { applySort(btn.getAttribute("data-best-card-sort")); });
      });
    }

    /* ── fetch + boot ───────────────────────────── */
    fetch(API + "/api/mlb/board")
      .then(function (r) {
        if (!r.ok) throw new Error("API returned " + r.status);
        return r.json();
      })
      .then(renderBoard)
      .catch(function (err) {
        app.innerHTML = '<div class="error-state">Failed to load board data.<br><small>' + esc(err.message) + '</small></div>';
      });
  }());
  </script>
</body>
</html>
