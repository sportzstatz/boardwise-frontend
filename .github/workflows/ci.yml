name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: boardwise-frontend / lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: boardwise-frontend / typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  unit-tests:
    name: boardwise-frontend / unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  api-contract-tests:
    name: boardwise-frontend / api-contract-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BOARDWISE_CONTRACT_API_BASE: https://api.useboardwise.com
      BOARDWISE_CONTRACT_SPORT: mlb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run API contract tests
        run: npm run test:contracts

      - name: Upload Playwright contract results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-contract-results
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  visual-snapshots:
    name: boardwise-frontend / visual-snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual snapshot tests
        run: npm run test:visual

      - name: Upload Playwright visual results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-visual-results
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  accessibility-tests:
    name: boardwise-frontend / accessibility-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Upload Playwright accessibility results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-accessibility-results
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  mobile-webkit-tests:
    name: boardwise-frontend / mobile-webkit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps webkit

      - name: Run mobile WebKit tests
        run: npm run test:mobile-webkit

      - name: Upload Playwright mobile WebKit results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-mobile-webkit-results
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  build:
    name: boardwise-frontend / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/_headers
          test -f dist/_redirects
          test -f dist/assets/js/mlb-team-branding.js
          test -f dist/assets/js/mlb-board.js
          test -f dist/assets/img/mlb/team-logos/PROVENANCE.md
