name: Candidate Frontend Contracts (Reusable)

on:
  workflow_call:
    inputs:
      release_id:
        description: "Release manifest identifier"
        required: true
        type: string
      data_sha:
        description: "Exact candidate boardwise-data commit"
        required: true
        type: string
      api_sha:
        description: "Exact candidate boardwise-api commit"
        required: true
        type: string
      frontend_sha:
        description: "Exact candidate boardwise-frontend commit"
        required: true
        type: string
      candidate_api_base:
        description: "Candidate API origin (never production)"
        required: true
        type: string
      session_cookie:
        description: "Candidate API session-cookie name"
        required: false
        default: "__Host-bw_session"
        type: string
    secrets:
      BOARDWISE_CONTRACT_FREE_SESSION_TOKEN:
        required: true
      BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN:
        required: true
      BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN:
        required: true
permissions:
  contents: read

concurrency:
  group: candidate-frontend-contracts-${{ inputs.release_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"
  BOARDWISE_RELEASE_ID: ${{ inputs.release_id }}
  BOARDWISE_DATA_SHA: ${{ inputs.data_sha }}
  BOARDWISE_API_SHA: ${{ inputs.api_sha }}
  BOARDWISE_FRONTEND_SHA: ${{ inputs.frontend_sha }}
  BOARDWISE_CONTRACT_API_BASE: ${{ inputs.candidate_api_base }}
  BOARDWISE_CONTRACT_TARGET: candidate
  BOARDWISE_CONTRACT_SESSION_COOKIE: ${{ inputs.session_cookie }}

jobs:
  candidate-contracts:
    name: candidate frontend contracts / reusable gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging

    steps:
      - name: Validate release metadata
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          DATA_SHA: ${{ inputs.data_sha }}
          API_SHA: ${{ inputs.api_sha }}
          FRONTEND_SHA: ${{ inputs.frontend_sha }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,79}$ ]]
          [[ "$DATA_SHA" =~ ^[0-9a-fA-F]{40}$ ]]
          [[ "$API_SHA" =~ ^[0-9a-fA-F]{40}$ ]]
          [[ "$FRONTEND_SHA" =~ ^[0-9a-fA-F]{40}$ ]]

      - name: Checkout exact data candidate
        uses: actions/checkout@v7
        with:
          repository: sportzstatz/boardwise-data
          ref: ${{ inputs.data_sha }}
          fetch-depth: 0
          path: candidate-data

      - name: Checkout exact API candidate
        uses: actions/checkout@v7
        with:
          repository: sportzstatz/boardwise-api
          ref: ${{ inputs.api_sha }}
          fetch-depth: 0
          path: candidate-api

      - name: Checkout exact frontend candidate
        uses: actions/checkout@v7
        with:
          repository: sportzstatz/boardwise-frontend
          ref: ${{ inputs.frontend_sha }}
          fetch-depth: 0
          path: source

      - name: Verify source identities and protected-branch reachability
        env:
          DATA_SHA: ${{ inputs.data_sha }}
          API_SHA: ${{ inputs.api_sha }}
          FRONTEND_SHA: ${{ inputs.frontend_sha }}
        run: |
          set -euo pipefail
          test "$(git -C candidate-data rev-parse HEAD)" = "${DATA_SHA,,}"
          test "$(git -C candidate-api rev-parse HEAD)" = "${API_SHA,,}"
          test "$(git -C source rev-parse HEAD)" = "${FRONTEND_SHA,,}"
          for repository in candidate-data candidate-api source; do
            git -C "$repository" fetch origin main --quiet
            git -C "$repository" merge-base --is-ancestor \
              "$(git -C "$repository" rev-parse HEAD)" origin/main
          done

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Install Playwright browser
        working-directory: source
        run: npx playwright install --with-deps chromium

      - name: Validate candidate API target
        working-directory: source
        run: node scripts/validate-contract-api-base.mjs

      - name: Record contract start
        id: contract-start
        run: echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Run candidate API, DOM, access, and billing contracts
        id: candidate-contracts
        continue-on-error: true
        working-directory: source
        env:
          BOARDWISE_CONTRACT_FREE_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_FREE_SESSION_TOKEN }}
          BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN }}
          BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN }}
        run: |
          for token in \
            "$BOARDWISE_CONTRACT_FREE_SESSION_TOKEN" \
            "$BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN" \
            "$BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN"; do
            echo "::add-mask::$token"
          done
          npm run test:contracts:candidate

      - name: Assemble sanitized frontend contract evidence
        if: always() && steps.candidate-contracts.outcome != 'skipped'
        working-directory: source
        env:
          BOARDWISE_CONTRACT_STATUS: ${{ steps.candidate-contracts.outcome == 'success' && 'passed' || 'failed' }}
          BOARDWISE_CONTRACT_STARTED_AT: ${{ steps.contract-start.outputs.started_at }}
          BOARDWISE_CONTRACT_FREE_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_FREE_SESSION_TOKEN }}
          BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_FOUNDER_SESSION_TOKEN }}
          BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN: ${{ secrets.BOARDWISE_CONTRACT_ADMIN_SESSION_TOKEN }}
        run: node scripts/write-candidate-contract-result.mjs

      - name: Upload candidate frontend contract evidence
        if: always() && steps.candidate-contracts.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-contracts-${{ inputs.release_id }}-${{ github.run_attempt }}
          path: source/frontend-contracts
          if-no-files-found: error
          retention-days: 30

      - name: Enforce candidate contract result
        if: steps.candidate-contracts.outcome != 'success'
        run: |
          echo "Candidate frontend contracts failed." >&2
          exit 1
