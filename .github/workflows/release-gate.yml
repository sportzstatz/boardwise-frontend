name: Frontend Release Gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - preview
          - production
      expected_sha:
        description: "Commit SHA to release"
        required: true
        type: string
      notes:
        description: "Release notes / reason"
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: frontend-release-${{ inputs.environment }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  release-gate:
    name: boardwise-frontend / release-gate / ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Validate release inputs
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "expected_sha must be a full 40-character commit SHA" >&2
            exit 1
          fi

      - name: Checkout expected commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0

      - name: Verify checked out SHA
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          printf 'Expected: %s\n' "$EXPECTED_SHA"
          printf 'Actual:   %s\n' "$actual"
          test "$actual" = "$EXPECTED_SHA"

      - name: Verify commit is reachable from main
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git merge-base --is-ancestor "$EXPECTED_SHA" origin/main

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Validate frontend
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run test:contracts
          npm run test:a11y
          npm run test:visual
          npm run test:mobile-webkit
          npm run build
          git diff --check

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/_headers
          test -f dist/_redirects
          test -f dist/assets/js/api-client.js
          test -f dist/assets/js/mlb-team-branding.js
          test -f dist/assets/js/mlb-board.js
          test -f dist/assets/img/mlb/team-logos/PROVENANCE.md
          test -f dist/assets/js/nhl-board.js
          test -f dist/assets/js/performance.js

      - name: Release handoff
        env:
          RELEASE_ENV: ${{ inputs.environment }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          {
            printf '# boardwise-frontend release handoff\n\n'
            printf 'Environment: %s\n' "$RELEASE_ENV"
            printf 'Commit: %s\n' "$EXPECTED_SHA"
            printf 'Notes:\n'
            printf '%s\n' "$RELEASE_NOTES" | sed 's/^/> /'
            printf '\n'
            cat <<'STATIC_RELEASE_HANDOFF'
          ## Required smoke

          - Cloudflare Pages deploy commit matches expected SHA.
          - / returns 200.
          - /login/ renders form and Turnstile area.
          - /mlb/ loads board data.
          - /nhl/ loads board payload.
          - /performance/ loads filters/summary/breakdown/picks.
          - No BoardWiseApi undefined errors.
          - No /api/v1/operator calls.
          - No X-BoardWise-Operator-Key header.
          STATIC_RELEASE_HANDOFF
          } > release-handoff.md

          token="$(uuidgen 2>/dev/null || openssl rand -hex 16)"
          echo "::stop-commands::$token"
          cat release-handoff.md
          echo "::$token::"

      - name: Upload release handoff
        uses: actions/upload-artifact@v7
        with:
          name: boardwise-frontend-release-handoff-${{ inputs.environment }}
          path: release-handoff.md
          retention-days: 30
