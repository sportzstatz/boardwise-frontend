<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SportsPredictionsHub</title>
</head>
<body>
  <h1>SportsPredictionsHub</h1>
  <p id="status">Loading...</p>

  <script>
    fetch("https://api.yourdomain.com/hello")
      .then((r) => r.json())
      .then((data) => {
        document.getElementById("status").textContent = data.message;
      })
      .catch(() => {
        document.getElementById("status").textContent = "API fetch failed.";
      });
  </script>
</body>
</html>
