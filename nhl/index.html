<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NHL Board Off-Season | BoardWise</title>
  <meta name="description" content="The BoardWise NHL board is off-season and not currently available.">
  <link rel="stylesheet" href="/assets/css/boardwise-theme.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--bw-page);
    }

    .nhl-offseason-shell {
      width: min(100%, 940px);
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    .nhl-offseason-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 56px;
    }

    .nhl-offseason-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nhl-offseason-links a {
      min-height: 38px;
      border: 1px solid var(--bw-border);
      border-radius: 999px;
      padding: 8px 13px;
      display: inline-flex;
      align-items: center;
      color: var(--bw-ink);
      background: var(--bw-panel);
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }

    .nhl-offseason-panel {
      max-width: 560px;
      border: 1px solid var(--bw-border);
      border-radius: 18px;
      background: var(--bw-panel);
      box-shadow: var(--bw-shadow);
      padding: 30px;
    }

    .nhl-offseason-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #dcd6c8;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      font-size: 24px;
      line-height: 1;
    }

    .nhl-offseason-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .nhl-offseason-panel h1 {
      margin: 0;
      color: var(--bw-ink);
      font-family: var(--bw-font-display);
      font-size: clamp(40px, 8vw, 64px);
      line-height: .9;
    }

    .nhl-offseason-panel p {
      margin: 10px 0 0;
      color: var(--bw-muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .nhl-offseason-return {
      margin-top: 22px;
      color: var(--bw-muted-light);
      font-size: 14px;
      font-weight: 900;
    }

    .nhl-offseason-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    @media (max-width: 620px) {
      .nhl-offseason-shell {
        padding: 20px 16px 48px;
      }

      .nhl-offseason-nav {
        margin-bottom: 32px;
      }

      .nhl-offseason-panel {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="nhl-offseason-shell">
    <nav class="nhl-offseason-nav" aria-label="BoardWise">
      <a class="bw-brand" href="/" aria-label="BoardWise home">
        <span class="bw-brand__mark" aria-hidden="true">B</span>
        <span class="bw-brand__name">BoardWise</span>
      </a>
      <div class="nhl-offseason-links">
        <a href="/">All Sports</a>
        <a href="/mlb/">MLB Board</a>
        <a href="/performance/">Performance</a>
        <a href="/account/">Account</a>
      </div>
    </nav>

    <section class="nhl-offseason-panel" aria-labelledby="nhl-offseason-title">
      <div class="nhl-offseason-head">
        <div class="nhl-offseason-icon" aria-hidden="true">🏒</div>
        <span class="bw-pill">Off-season</span>
      </div>
      <h1 id="nhl-offseason-title">NHL</h1>
      <p>Hockey coverage is off-season. The NHL board is not currently available.</p>
      <div class="nhl-offseason-return">Returns Oct 2026</div>
      <div class="nhl-offseason-actions">
        <a class="bw-button bw-button--gold" href="/mlb/">Open MLB board</a>
        <a class="bw-button bw-button--secondary" href="/">All sports</a>
      </div>
    </section>
  </main>
</body>
</html>
